dataset: telco_churn

row_count:
  min: 1

columns:
  - name: tenure_months
    dtype: int
    nullable: false
    min: 0
    max: 72

  - name: monthly_charges
    dtype: float
    nullable: false
    min: 0.0
    max: 200.0

  - name: total_charges
    dtype: float
    nullable: true
    min: 0.0

  - name: num_support_tickets
    dtype: int
    nullable: false
    min: 0
    max: 50

  - name: contract_type
    dtype: str
    nullable: false
    allowed: ["Month-to-month", "One year", "Two year"]

  - name: payment_method
    dtype: str
    nullable: false
    allowed: ["Electronic check", "Mailed check", "Bank transfer", "Credit card"]

  - name: internet_service
    dtype: str
    nullable: false
    allowed: ["DSL", "Fiber optic", "None"]

  - name: has_phone_service
    dtype: str
    nullable: false
    allowed: ["Yes", "No"]

  - name: paperless_billing
    dtype: str
    nullable: false
    allowed: ["Yes", "No"]
